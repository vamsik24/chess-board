<style>

  .dot{

    background: rgba(36,24,17,0.35);

  .piece-w{ color:#fbf7ee; text-shadow: 0 1px 0 #b8923f, 0 2px 3px rgba(0,0,0,0.5); font-family: 'Segoe UI Symbol', 'DejaVu Sans', Arial, sans-serif; }
  .piece-b{ color:#241811; text-shadow: 0 1px 0 rgba(255,255,255,0.15); font-family: 'Segoe UI Symbol', 'DejaVu Sans', Arial, sans-serif; }
  .status-row{

  .tier-tab .tag{

  .progress-bar-track{
    width:100%;

    background: rgba(0,0,0,0.25);
    border-radius:99px;

  }
  .progress-bar-fill{
    height:100%;
    background: linear-gradient(90deg, var(--brass), var(--brass-bright));
    transition: width 0.3s ease;
  }
  .progress-label{
    font-size:12px;
    color: var(--ivory);
    opacity:0.75;
  }
  .level-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(54px, 1fr));
    gap:8px;
    width:100%;
    max-width:480px;
  }
  .level-card{
    aspect-ratio: 1 / 1;
    border-radius:7px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    border:1px solid rgba(184,146,63,0.3);

  }
  .level-card:hover{ transform: translateY(-2px); }

  /* ---- Play screen ---- */
  #playScreen{ display:none; }
  .back-row{
    display:flex;
    align-items:center;
    gap:10px;
    width:100%;

    margin-bottom: 2px;
  }
  .back-link{
    font-family:'Inter',sans-serif;
    font-size:13px;
    color: var(--brass-bright);
    cursor:pointer;

    border:none;
    padding:0;
  }
  .level-badge{
    font-size:12px;
    color: var(--ink-soft);
    background: rgba(184,146,63,0.15);
    border: 1px solid rgba(184,146,63,0.4);

  }

  .win-banner button{
    margin-top:10px;

<body>

<div id="homeScreen">
  <div class="home-header">
    <span class="eyebrow">Step 3 · 150-level ladder</span>
    <h1 style="margin:0;">Chess Ladder</h1>
  </div>

  <div class="tier-tabs" id="tierTabs"></div>
  <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>
  <div class="level-grid" id="levelGrid"></div>
</div>

<div id="playScreen">
<div class="app">
  <div class="board-col">
    <div class="back-row">
      <button class="back-link" id="backBtn">← Levels</button>
      <span class="level-badge" id="levelBadge"></span>
    </div>
    <div class="board-frame">
      <div class="board" id="board"></div>
    </div>
    <div class="status-row">
      <span class="status-dot"></span>
      <span id="statusText">White to move</span>
    </div>
    <div class="controls">
      <button id="newGameBtn">Restart level</button>
      <button id="undoBtn">Undo move</button>
      <button id="flipBtn">Flip board</button>
    </div>
    <div class="win-banner" id="winBanner">
      <div class="title" id="winTitle"></div>
      <div class="sub" id="winSub"></div>
      <button id="nextLevelBtn">Next level →</button>
    </div>
  </div>

  <div class="panel">
    <h2>Move log</h2>
    <div class="sub" id="panelSub">You play White. The engine plays Black.</div>

    <div class="empty-note" id="emptyNote">No moves yet. Click a piece, then click a highlighted square.</div>
  </div>
</div>
</div>

<script>
// --- 150-level ladder configuration ---
// Anchor point from user testing: Skill 5 / Depth 6 felt like a solid mid-level
// player. The curve below is built around that as roughly the Moderate midpoint.
const TIERS = ['beginner', 'moderate', 'advanced'];

function lerp(a, b, t){ return a + (b - a) * t; }

function buildLevels(){
  const levels = [];
  for(let g = 1; g <= 150; g++){
    let tier, within;
    if(g <= 50){ tier = 'beginner'; within = g; }
    else if(g <= 100){ tier = 'moderate'; within = g - 50; }
    else { tier = 'advanced'; within = g - 100; }

    const t = (within - 1) / 49; // 0 -> 1 across the 50 levels in this tier
    let skill, depth, blunderRate;

    if(tier === 'beginner'){
      skill = Math.round(lerp(0, 4, t));
      depth = Math.round(lerp(1, 3, t));
      blunderRate = lerp(0.55, 0.08, t);
    } else if(tier === 'moderate'){
      skill = Math.round(lerp(4, 11, t));
      depth = Math.round(lerp(3, 9, t));
      blunderRate = lerp(0.08, 0.01, t);
    } else {
      skill = Math.round(lerp(11, 20, t));
      depth = Math.round(lerp(9, 18, t));
      blunderRate = lerp(0.01, 0, t);
    }

    levels.push({ global: g, tier, within, skill, depth, blunderRate });
  }
  return levels;
}

const LEVELS = buildLevels();

function tierLabel(tier){
  return tier === 'beginner' ? 'Beginner' : tier === 'moderate' ? 'Moderate' : 'Advanced';
}
function tierStart(tier){
  return tier === 'beginner' ? 1 : tier === 'moderate' ? 51 : 101;
}

// --- Progress persistence (this device, via localStorage) ---
const PROGRESS_KEY = 'chessLadderProgress';

function loadProgress(){
  try{
    const raw = localStorage.getItem(PROGRESS_KEY);
    if(raw) return JSON.parse(raw);
  } catch(e){}
  return { unlockedLevel: 1 };
}
function saveProgress(){
  try{ localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress)); } catch(e){}
}

let progress = loadProgress();
let activeTab = progress.unlockedLevel >= 101 ? 'advanced' : progress.unlockedLevel >= 51 ? 'moderate' : 'beginner';
let currentLevel = null;        // global 1-150, set when a level is selected
let levelCompleteHandled = false;

// --- Home screen rendering ---
function renderHome(){
  renderTierTabs();
  renderProgressBar();
  renderLevelGrid();
}

function renderTierTabs(){
  const tabsEl = document.getElementById('tierTabs');
  tabsEl.innerHTML = '';
  TIERS.forEach(tier => {
    const start = tierStart(tier);
    const unlocked = progress.unlockedLevel >= start;
    const completedInTier = Math.max(0, Math.min(50, progress.unlockedLevel - start));
    const div = document.createElement('div');
    div.className = 'tier-tab' + (tier === activeTab ? ' active' : '') + (!unlocked ? ' locked' : '');
    div.innerHTML = tierLabel(tier) + `<span class="tag">${unlocked ? completedInTier + '/50' : 'Locked'}</span>`;
    if(unlocked){
      div.addEventListener('click', () => { activeTab = tier; renderHome(); });
    }
    tabsEl.appendChild(div);
  });
}

function renderProgressBar(){
  const start = tierStart(activeTab);
  const completed = Math.max(0, Math.min(50, progress.unlockedLevel - start));
  document.getElementById('progressFill').style.width = (completed / 50 * 100) + '%';
  document.getElementById('progressLabel').textContent = `${tierLabel(activeTab)}: ${completed}/50 complete`;
}

function renderLevelGrid(){
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';
  const start = tierStart(activeTab);
  for(let i = 1; i <= 50; i++){
    const globalLevel = start + i - 1;
    const isLocked = globalLevel > progress.unlockedLevel;
    const isCompleted = globalLevel < progress.unlockedLevel;
    const isCurrent = globalLevel === progress.unlockedLevel;
    const card = document.createElement('div');
    card.className = 'level-card' + (isLocked ? ' locked' : '') + (isCompleted ? ' completed' : '') + (isCurrent ? ' current' : '');
    card.textContent = i;
    if(!isLocked){
      card.addEventListener('click', () => selectLevel(globalLevel));
    }
    grid.appendChild(card);
  }
}

function selectLevel(globalLevel){
  currentLevel = globalLevel;
  levelCompleteHandled = false;
  const cfg = LEVELS[globalLevel - 1];
  AI_SKILL_LEVEL = cfg.skill;
  AI_SEARCH_DEPTH = cfg.depth;
  currentBlunderRate = cfg.blunderRate;

  game.reset();
  selectedSquare = null;
  legalTargets = [];
  aiThinking = false;
  stopThinkTimer();

  document.getElementById('levelBadge').textContent = `${tierLabel(cfg.tier)} ${cfg.within}`;
  document.getElementById('panelSub').textContent = `You play White. ${tierLabel(cfg.tier)} level ${cfg.within} of 50.`;
  document.getElementById('winBanner').classList.remove('show');
  document.getElementById('homeScreen').style.display = 'none';
  document.getElementById('playScreen').style.display = 'block';

  if(engine && engineReady){
    engine.postMessage(`setoption name Skill Level value ${AI_SKILL_LEVEL}`);
  }
  render();
}

function backToHome(){
  document.getElementById('playScreen').style.display = 'none';
  document.getElementById('homeScreen').style.display = 'flex';
  renderHome();
}

function maybeHandleGameEnd(){
  if(!game.in_checkmate() || levelCompleteHandled) return;
  const humanWon = game.turn() !== HUMAN_COLOR; // side to move is the side that got mated
  if(!humanWon) return;
  levelCompleteHandled = true;

  const cfg = LEVELS[currentLevel - 1];
  const wasFrontier = currentLevel === progress.unlockedLevel && progress.unlockedLevel < 150;
  if(wasFrontier){
    progress.unlockedLevel += 1;
    saveProgress();
  }

  const title = document.getElementById('winTitle');
  const sub = document.getElementById('winSub');
  title.textContent = `Level complete — ${tierLabel(cfg.tier)} ${cfg.within} beaten!`;

  if(!wasFrontier){
    sub.textContent = 'Nice replay — this level was already cleared.';
  } else if(currentLevel === 150){
    sub.textContent = "You've beaten the entire ladder. Legendary.";
  } else {
    const nextCfg = LEVELS[currentLevel]; // 0-indexed array, so this is the next level
    const crossedTier = nextCfg.tier !== cfg.tier;
    sub.textContent = crossedTier
      ? `${tierLabel(nextCfg.tier)} tier unlocked! Level ${nextCfg.within} awaits.`
      : `${tierLabel(nextCfg.tier)} ${nextCfg.within} unlocked.`;
  }
  document.getElementById('winBanner').classList.add('show');
}

function applyRandomLegalMove(){
  const moves = game.moves({ verbose: true });
  if(moves.length === 0) return;
  const m = moves[Math.floor(Math.random() * moves.length)];
  game.move({ from: m.from, to: m.to, promotion: m.promotion || 'q' });
}

const game = new Chess();
let selectedSquare = null;
let legalTargets = [];
let flipped = false;

// --- AI opponent (Stockfish via Web Worker) ---
const HUMAN_COLOR = 'w';
let AI_SKILL_LEVEL = 5;         // overwritten per-level by selectLevel()
let AI_SEARCH_DEPTH = 6;        // overwritten per-level by selectLevel()
let currentBlunderRate = 0;     // overwritten per-level by selectLevel()
let engine = null;
let engineReady = false;
let engineFailed = false;
let aiThinking = false;
let thinkStartTime = null;
let thinkTimerHandle = null;

async function initEngine(){
  try{
    statusText.textContent = 'Loading engine…';
    const resp = await fetch(STOCKFISH_URL);
    if(!resp.ok) throw new Error('Fetch failed: ' + resp.status);
    const code = await resp.text();
    // Workers can't load a script directly from another domain, so we pull the
    // code in ourselves and hand the worker a same-origin blob copy of it.
    const blobUrl = URL.createObjectURL(new Blob([code], { type: 'application/javascript' }));
    engine = new Worker(blobUrl);
    engine.onmessage = handleEngineMessage;
    engine.onerror = (err) => {
      engineFailed = true;
      statusText.textContent = 'Engine error — see console';
      console.error('Stockfish worker error:', err.message || err);
    };
    engine.postMessage('uci');
  } catch(err){
    engineFailed = true;
    statusText.textContent = 'Engine failed to load — check connection';
    console.error('Engine init failed:', err);
  }
}

function handleEngineMessage(e){
  const line = typeof e.data === 'string' ? e.data : '';

  if(line === 'uciok'){
    engine.postMessage(`setoption name Skill Level value ${AI_SKILL_LEVEL}`);
    engine.postMessage('isready');
    return;
  }

  if(line === 'readyok'){
    engineReady = true;
    render();
    return;
  }

  if(line.startsWith('bestmove')){
    const parts = line.split(' ');
    const uciMove = parts[1]; // e.g. "e7e8q" or "e2e4"
    aiThinking = false;
    stopThinkTimer();
    if(uciMove && uciMove !== '(none)'){
      if(Math.random() < currentBlunderRate){
        applyRandomLegalMove(); // low levels occasionally ignore the engine and play a real mistake
      } else {
        applyEngineMove(uciMove);
      }
    }
    render();
    maybeHandleGameEnd();
  }
}

function applyEngineMove(uciMove){
  const from = uciMove.slice(0, 2);
  const to = uciMove.slice(2, 4);
  const promotion = uciMove.length > 4 ? uciMove[4] : undefined;
  game.move({ from, to, promotion: promotion || 'q' });
}

function maybeTriggerAI(){
  if(game.game_over()) return;
  if(game.turn() === HUMAN_COLOR) return;
  if(engineFailed) return;
  if(!engineReady){
    // engine still warming up — retry shortly rather than dropping the turn
    setTimeout(maybeTriggerAI, 150);
    return;
  }
  aiThinking = true;
  startThinkTimer();
  render();
  engine.postMessage(`position fen ${game.fen()}`);
  engine.postMessage(`go depth ${AI_SEARCH_DEPTH}`);
}

function startThinkTimer(){
  thinkStartTime = performance.now();
  clearInterval(thinkTimerHandle);
  thinkTimerHandle = setInterval(() => {
    if(!aiThinking) return;
    const elapsed = ((performance.now() - thinkStartTime) / 1000).toFixed(1);
    statusText.textContent = `AI is thinking… ${elapsed}s`;
  }, 100);
}

function stopThinkTimer(){
  clearInterval(thinkTimerHandle);
  thinkTimerHandle = null;
}

const PIECE_UNICODE = {
  p:'♟', r:'♜', n:'♞', b:'♝', q:'♛', k:'♚',
  P:'♙', R:'♖', N:'♘', B:'♗', Q:'♕', K:'♔'
};

const boardEl = document.getElementById('board');
const statusText = document.getElementById('statusText');
const movelistEl = document.getElementById('movelist');
const emptyNote = document.getElementById('emptyNote');

function squareId(fileIdx, rankIdx){
  // fileIdx 0-7 => a-h, rankIdx 0-7 => 8-1 (top to bottom as drawn)
  const files = 'abcdefgh';
  return files[fileIdx] + (8 - rankIdx);
}

function render(){
  boardEl.innerHTML = '';
  const board = game.board(); // 8x8, board[0] = rank 8 ... board[7] = rank 1

  for(let r = 0; r < 8; r++){
    for(let f = 0; f < 8; f++){
      const rowIdx = flipped ? 7 - r : r;
      const colIdx = flipped ? 7 - f : f;
      const piece = board[rowIdx][colIdx];
      const sq = squareId(colIdx, rowIdx);

      const isLight = (rowIdx + colIdx) % 2 === 0;
      const div = document.createElement('div');
      div.className = 'sq ' + (isLight ? 'light' : 'dark');
      div.dataset.square = sq;

      if(colIdx === (flipped ? 7 : 0)){
        const rankLabel = document.createElement('span');
        rankLabel.className = 'coord rank';
        rankLabel.textContent = 8 - rowIdx;
        div.appendChild(rankLabel);
      }
      if(rowIdx === (flipped ? 0 : 7)){
        const fileLabel = document.createElement('span');
        fileLabel.className = 'coord file';
        fileLabel.textContent = 'abcdefgh'[colIdx];
        div.appendChild(fileLabel);
      }

      if(piece){
        const span = document.createElement('span');
        span.className = piece.color === 'w' ? 'piece-w' : 'piece-b';
        const glyph = PIECE_UNICODE[piece.color === 'w' ? piece.type.toUpperCase() : piece.type];
        // \uFE0E forces plain text-style rendering instead of iOS's colorful emoji-style glyph
        span.textContent = glyph + '\uFE0E';
        div.appendChild(span);
      }

      if(sq === selectedSquare){
        div.classList.add('selected');
      }

      if(legalTargets.includes(sq)){
        const dot = document.createElement('div');
        const targetPiece = game.get(sq);
        dot.className = 'dot' + (targetPiece ? ' capture' : '');
        div.appendChild(dot);
      }

      div.addEventListener('click', () => onSquareClick(sq));
      boardEl.appendChild(div);
    }
  }

  updateStatus();
  updateMoveList();
}

function onSquareClick(sq){
  if(aiThinking || game.turn() !== HUMAN_COLOR) return;
  const piece = game.get(sq);

  if(selectedSquare){
    if(legalTargets.includes(sq)){
      const moveObj = { from: selectedSquare, to: sq, promotion: 'q' };
      game.move(moveObj);
      selectedSquare = null;
      legalTargets = [];
      render();
      maybeHandleGameEnd();
      maybeTriggerAI();
      return;
    }
    // clicking another own piece re-selects
    if(piece && piece.color === game.turn()){
      selectedSquare = sq;
      legalTargets = game.moves({ square: sq, verbose: true }).map(m => m.to);
      render();
      return;
    }
    selectedSquare = null;
    legalTargets = [];
    render();
    return;
  }

  if(piece && piece.color === game.turn()){
    selectedSquare = sq;
    legalTargets = game.moves({ square: sq, verbose: true }).map(m => m.to);
    render();
  }
}

function updateStatus(){
  const dot = document.querySelector('.status-dot');
  dot.classList.toggle('thinking', aiThinking);

  if(game.in_checkmate()){
    const winner = game.turn() === 'w' ? 'Black' : 'White';
    statusText.textContent = `Checkmate — ${winner} wins`;
  } else if(game.in_draw()){
    statusText.textContent = 'Draw';
  } else if(aiThinking){
    statusText.textContent = 'AI is thinking…';
  } else if(game.in_check()){
    statusText.textContent = (game.turn() === 'w' ? 'White' : 'Black') + ' to move — in check';
  } else {
    statusText.textContent = (game.turn() === 'w' ? 'White' : 'Black') + ' to move';
  }
}

function updateMoveList(){
  const history = game.history();
  movelistEl.innerHTML = '';
  if(history.length === 0){
    emptyNote.style.display = 'block';
    return;
  }
  emptyNote.style.display = 'none';

  for(let i = 0; i < history.length; i += 2){
    const num = document.createElement('span');
    num.className = 'num';
    num.textContent = (i/2 + 1) + '.';
    const white = document.createElement('span');
    white.className = 'mv';
    white.textContent = history[i] || '';
    const black = document.createElement('span');
    black.className = 'mv';
    black.textContent = history[i+1] || '';
    movelistEl.appendChild(num);
    movelistEl.appendChild(white);
    movelistEl.appendChild(black);
  }
  movelistEl.scrollTop = movelistEl.scrollHeight;
}

document.getElementById('newGameBtn').addEventListener('click', () => {
  game.reset();
  selectedSquare = null;
  legalTargets = [];
  aiThinking = false;
  levelCompleteHandled = false;
  stopThinkTimer();
  document.getElementById('winBanner').classList.remove('show');
  if(engine && engineReady) engine.postMessage('ucinewgame');
  render();
});

document.getElementById('backBtn').addEventListener('click', backToHome);

document.getElementById('nextLevelBtn').addEventListener('click', () => {
  if(currentLevel < 150){
    selectLevel(currentLevel + 1);
  } else {
    backToHome();
  }
});

document.getElementById('undoBtn').addEventListener('click', () => {
  if(aiThinking) return; // don't undo mid-think, the bestmove reply would land on a stale position
  game.undo(); // undo AI's move
  game.undo(); // undo your move — back to your turn
  selectedSquare = null;
  legalTargets = [];
  levelCompleteHandled = false;
  document.getElementById('winBanner').classList.remove('show');
  render();
});

document.getElementById('flipBtn').addEventListener('click', () => {
  flipped = !flipped;
  render();
});

renderHome();
initEngine(); // async — loads the engine in the background
</script>
</body>
</html>
