<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Ladder</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#241811">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<!-- Stockfish runs as a background Web Worker so the UI never freezes while it thinks -->
<script>
  const STOCKFISH_URL = "https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js";
</script>
<style>
  :root{
    --wood-dark: #3b2a1e;
    --wood-darker: #241811;
    --ivory: #f1e9d2;
    --square-light: #e9dcbf;
    --square-dark: #7a5a3a;
    --square-light-hi: #f4e9c4;
    --square-dark-hi: #a8834f;
    --brass: #b8923f;
    --brass-bright: #d4ac54;
    --ink: #241811;
    --ink-soft: #6b5c4a;
    --panel: #fbf7ee;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  .sq{ touch-action: manipulation; }
  html, body{
    margin:0;
    width:100%;
    overflow-x:hidden;
  }
  body{
    min-height:100vh;
    min-height:100dvh;
    background: var(--wood-darker);
    background-image: radial-gradient(circle at 50% 0%, #3b2a1e 0%, #241811 70%);
    color: var(--ivory);
    font-family: 'Inter', sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 24px 12px;
  }
  .app{
    display:flex;
    gap: 28px;
    flex-wrap: wrap;
    align-items:flex-start;
    justify-content:center;
    max-width: 920px;
    width:100%;
  }
  .board-col{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    width:100%;
    max-width: 480px;
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color: var(--brass-bright);
    font-weight:600;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:28px;
    margin:2px 0 0;
    color: var(--ivory);
  }
  .board-frame{
    background: linear-gradient(160deg, #5a3f28, #2c1e14);
    padding: 3.2%;
    border-radius: 6px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(184,146,63,0.3);
    width: min(94vw, 480px);
    box-sizing: border-box;
  }
  .board{
    display:grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    width:100%;
    aspect-ratio: 1 / 1;
    border: 2px solid var(--brass);
  }
  .sq{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: clamp(20px, 6.6vw, 38px);
    cursor:pointer;
    user-select:none;
    transition: background 0.12s ease;
  }
  .sq.light{ background: var(--square-light); }
  .sq.dark{ background: var(--square-dark); }
  .sq.selected.light{ background: var(--square-light-hi); }
  .sq.selected.dark{ background: var(--square-dark-hi); }
  .sq.last-move.light{ background: #d9cf9a; }
  .sq.last-move.dark{ background: #8a6a44; }
  .sq.king-check{
    box-shadow: inset 0 0 0 3px rgba(200,50,40,0.85);
    animation: checkPulse 1s ease-in-out infinite;
  }
  @keyframes checkPulse{
    0%, 100%{ box-shadow: inset 0 0 0 3px rgba(200,50,40,0.55); }
    50%{ box-shadow: inset 0 0 0 3px rgba(200,50,40,0.95); }
  }
  .sq .coord{
    position:absolute;
    font-family:'Inter',sans-serif;
    font-size:0.24em;
    font-weight:600;
    opacity:0.55;
  }
  .sq .coord.file{ bottom:2px; right:3px; }
  .sq .coord.rank{ top:2px; left:3px; }
  .sq.light .coord{ color: var(--square-dark); }
  .sq.dark .coord{ color: var(--square-light); }
  .dot{
    position:absolute;
    width:0.42em;height:0.42em;
    border-radius:50%;
    background: rgba(36,24,17,0.35);
    pointer-events:none;
  }
  .dot.capture{
    width:1.4em;height:1.4em;
    background:none;
    border: 0.1em solid rgba(178,50,40,0.55);
  }
  .piece-w{ color:#fbf7ee; text-shadow: 0 1px 0 #b8923f, 0 2px 3px rgba(0,0,0,0.5); font-family: 'Segoe UI Symbol', 'DejaVu Sans', Arial, sans-serif; }
  .piece-b{ color:#241811; text-shadow: 0 1px 0 rgba(255,255,255,0.15); font-family: 'Segoe UI Symbol', 'DejaVu Sans', Arial, sans-serif; }
  .status-row{

    align-items:center;
    gap:10px;
    font-size:14px;
    color: var(--ivory);
    opacity:0.85;
  }
  .status-dot{
    width:8px;height:8px;border-radius:50%;
    background: var(--brass-bright);
  }

    animation: pulse 0.9s ease-in-out infinite;

  @keyframes pulse{
    0%, 100%{ opacity:1; transform:scale(1); }
    50%{ opacity:0.4; transform:scale(0.7); }
  }
  .controls{
    display:flex;
    gap:10px;
  }
  button{
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:500;
    padding:9px 16px;
    border-radius:5px;
    border:1px solid rgba(184,146,63,0.5);
    background: transparent;
    color: var(--brass-bright);
    cursor:pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  button:hover{ background: rgba(184,146,63,0.15); }
  .panel{
    width: min(260px, 92vw);
    background: var(--panel);
    border-radius: 8px;
    padding: 20px 22px;
    color: var(--ink);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  }
  .panel h2{
    font-family:'Fraunces', serif;
    font-size:16px;
    font-weight:600;
    margin: 0 0 4px;
  }
  .panel .sub{

    font-size:18px;
    line-height:1;

    font-size:12px;
    font-weight:600;
    color: var(--brass);
    margin-left:4px;

    color: var(--ink-soft);
    line-height:1.6;

  #homeScreen{
    width: 100%;
    max-width: 640px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 18px;
  }
  .home-header{
    text-align:center;
  }
  .home-header .eyebrow{ display:block; margin-bottom:4px; }
  .tier-tabs{
    display:flex;
    gap:8px;
    width:100%;
    max-width: 480px;
  }
  .tier-tab{
    flex:1;
    padding: 10px 8px;
    border-radius: 6px;
    border:1px solid rgba(184,146,63,0.4);
    background: rgba(0,0,0,0.15);
    color: var(--ivory);
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    text-align:center;

    display:block;
    font-size:10px;
    font-weight:500;
    opacity:0.8;
    margin-top:2px;

    border-radius:99px;

  .progress-label{
    font-size:12px;
    color: var(--ivory);

    display:flex;
    align-items:center;
    gap:6px;
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:600;
    color: var(--ivory);

    width:100%;
    max-width:480px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .badge-section-label{
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color: var(--ivory);
    opacity:0.55;
  }
  .badge-shelf{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .badge-chip{
    width:50px;
    height:50px;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;

    border: 1px solid rgba(184,146,63,0.3);

  .badge-chip.unlocked{ background: rgba(184,146,63,0.28); border-color: var(--brass-bright); }

    position:fixed;
    top:16px;
    left:50%;

    font-family:'Inter',sans-serif;

  .badge-toast .icon{ font-size:26px; }
  .badge-toast .title{ font-weight:700; font-size:13px; }
  .badge-toast .sub{ font-size:11px; opacity:0.85; }
  @keyframes toastIn{
    from{ transform: translateY(-14px); opacity:0; }
    to{ transform: translateY(0); opacity:1; }

  .level-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(54px, 1fr));
    gap:8px;
    width:100%;
    max-width:480px;
  }
  .level-card{
    aspect-ratio: 1 / 1;
    border-radius:7px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    border:1px solid rgba(184,146,63,0.3);
    background: rgba(241,233,210,0.08);
    color: var(--ivory);
    position:relative;
    transition: transform 0.1s ease, background 0.15s ease;
  }
  .level-card:hover{ transform: translateY(-2px); }
  .level-card.completed{

    color: var(--wood-darker);
  }
  .level-card.current{
    outline: 2px solid var(--brass-bright);

  }
  .level-card.locked{
    opacity:0.35;
    cursor:not-allowed;
    background: rgba(0,0,0,0.2);

  .level-card.locked:hover{ transform:none; }

  /* ---- Play screen ---- */
  #playScreen{ display:none; }
  .back-row{
    display:flex;
    align-items:center;
    gap:10px;
    width:100%;
    max-width:480px;
    margin-bottom: 2px;
  }
  .back-link{
    font-family:'Inter',sans-serif;
    font-size:13px;
    color: var(--brass-bright);
    cursor:pointer;
    background:none;
    border:none;
    padding:0;
  }
  .level-badge{
    font-size:12px;
    color: var(--ink-soft);
    background: rgba(184,146,63,0.15);
    border: 1px solid rgba(184,146,63,0.4);
    padding: 3px 10px;
    border-radius: 99px;
    color: var(--brass-bright);

  .win-banner{
    display:none;
    width:100%;
    background: linear-gradient(135deg, var(--brass), var(--brass-bright));
    color: var(--wood-darker);
    border-radius:8px;
    padding: 14px 16px;
    font-family:'Inter',sans-serif;
    text-align:center;
  }
  .win-banner.show{ display:block; }
  .win-banner .title{ font-weight:700; font-size:15px; margin-bottom:2px; }
  .win-banner .sub{ font-size:12px; opacity:0.85; }
  .win-banner button{
    margin-top:10px;
    border-color: var(--wood-darker);
    color: var(--wood-darker);
  }
</style>

<div class="app">
  <div class="board-col">
    <div class="back-row">
      <button class="back-link" id="backBtn">← Levels</button>
      <span class="level-badge" id="levelBadge"></span>
    </div>
    <div class="board-frame">
      <div class="board" id="board"></div>
    </div>

    </div>

    <div class="sub" id="panelSub">You play White. The engine plays Black.</div>

<script>
// --- 150-level ladder configuration ---
// Anchor point from user testing: Skill 5 / Depth 6 felt like a solid mid-level
// player. The curve below is built around that as roughly the Moderate midpoint.
const TIERS = ['beginner', 'moderate', 'advanced'];

function lerp(a, b, t){ return a + (b - a) * t; }

function buildLevels(){
  const levels = [];
  for(let g = 1; g <= 150; g++){
    let tier, within;
    if(g <= 50){ tier = 'beginner'; within = g; }
    else if(g <= 100){ tier = 'moderate'; within = g - 50; }
    else { tier = 'advanced'; within = g - 100; }

    const t = (within - 1) / 49; // 0 -> 1 across the 50 levels in this tier
    let skill, moveTimeMs, blunderRate;

    // moveTimeMs caps how long the engine may think — this bounds worst-case
    // wait time regardless of how complex the position gets deep into a game.
    if(tier === 'beginner'){
      skill = Math.round(lerp(0, 4, t));
      moveTimeMs = Math.round(lerp(150, 400, t));
      blunderRate = lerp(0.55, 0.08, t);
    } else if(tier === 'moderate'){
      skill = Math.round(lerp(4, 11, t));
      moveTimeMs = Math.round(lerp(400, 900, t));
      blunderRate = lerp(0.08, 0.01, t);
    } else {
      skill = Math.round(lerp(11, 20, t));
      moveTimeMs = Math.round(lerp(900, 2500, t));
      blunderRate = lerp(0.01, 0, t);
    }

    levels.push({ global: g, tier, within, skill, moveTimeMs, blunderRate });
  }
  return levels;
}

const LEVELS = buildLevels();

function tierLabel(tier){
  return tier === 'beginner' ? 'Beginner' : tier === 'moderate' ? 'Moderate' : 'Advanced';
}
function tierStart(tier){
  return tier === 'beginner' ? 1 : tier === 'moderate' ? 51 : 101;
}

// --- Progress persistence (this device, via localStorage) ---
const PROGRESS_KEY = 'chessLadderProgress';

function loadProgress(){
  let p = { unlockedLevel: 1 };
  try{
    const raw = localStorage.getItem(PROGRESS_KEY);
    if(raw) p = JSON.parse(raw);
  } catch(e){}
  // Fill in defaults for anyone with older saved progress from before this feature existed
  if(!p.streak) p.streak = { current: 0, longest: 0, lastPlayedDate: null };
  if(!p.badges) p.badges = [];
  if(typeof p.completedLadder !== 'boolean') p.completedLadder = false;
  if(typeof p.hasFlawlessWin !== 'boolean') p.hasFlawlessWin = false;
  return p;
}
function saveProgress(){
  try{ localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress)); } catch(e){}
}

let progress = loadProgress();
let activeTab = progress.unlockedLevel >= 101 ? 'advanced' : progress.unlockedLevel >= 51 ? 'moderate' : 'beginner';
let currentLevel = null;        // global 1-150, set when a level is selected
let levelCompleteHandled = false;
let usedUndoThisGame = false;   // tracks eligibility for the "Flawless Victory" badge

// --- Daily streak ---
function todayString(){
  return new Date().toISOString().slice(0, 10);
}

function registerPlaySession(){
  const today = todayString();
  if(progress.streak.lastPlayedDate === today) return; // already counted today

  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  progress.streak.current = (progress.streak.lastPlayedDate === yesterday) ? progress.streak.current + 1 : 1;
  progress.streak.lastPlayedDate = today;
  progress.streak.longest = Math.max(progress.streak.longest, progress.streak.current);
  saveProgress();
  checkBadges();
}

// --- Badges ---
const BADGES = [
  { id: 'first_win', name: 'First Blood', icon: '⚔️', desc: 'Win your first level', condition: () => progress.unlockedLevel >= 2 },
  { id: 'ten_levels', name: 'Getting Started', icon: '🔥', desc: 'Clear 10 levels', condition: () => progress.unlockedLevel >= 11 },
  { id: 'quarter_ladder', name: 'Quarter Ladder', icon: '🥉', desc: 'Clear 25 levels', condition: () => progress.unlockedLevel >= 26 },
  { id: 'beginner_grad', name: 'Beginner Graduate', icon: '🎓', desc: 'Clear all 50 Beginner levels', condition: () => progress.unlockedLevel >= 51 },
  { id: 'halfway_ladder', name: 'Halfway There', icon: '🥈', desc: 'Clear 75 levels', condition: () => progress.unlockedLevel >= 76 },
  { id: 'moderate_grad', name: 'Moderate Graduate', icon: '🎖️', desc: 'Clear all Beginner + Moderate levels', condition: () => progress.unlockedLevel >= 101 },
  { id: 'almost_there', name: 'Almost There', icon: '🥇', desc: 'Clear 125 levels', condition: () => progress.unlockedLevel >= 126 },
  { id: 'ladder_master', name: 'Ladder Master', icon: '👑', desc: 'Beat Advanced Level 50', condition: () => !!progress.completedLadder },
  { id: 'flawless', name: 'Flawless Victory', icon: '✨', desc: 'Win a level without using Undo', condition: () => !!progress.hasFlawlessWin },
  { id: 'streak_3', name: '3-Day Streak', icon: '📅', desc: 'Play 3 days in a row', condition: () => (progress.streak.longest || 0) >= 3 },
  { id: 'streak_7', name: 'Week Warrior', icon: '🗓️', desc: 'Play 7 days in a row', condition: () => (progress.streak.longest || 0) >= 7 },
  { id: 'streak_30', name: 'Monthly Master', icon: '🏆', desc: 'Play 30 days in a row', condition: () => (progress.streak.longest || 0) >= 30 },
];

function checkBadges(){
  const newlyEarned = [];
  BADGES.forEach(b => {
    if(!progress.badges.includes(b.id) && b.condition()){
      progress.badges.push(b.id);
      newlyEarned.push(b);
    }
  });
  if(newlyEarned.length){
    saveProgress();
    showBadgeToasts(newlyEarned);
  }
  renderBadgeShelf();
}

function showBadgeToasts(badges){
  const container = document.getElementById('badgeToastContainer');
  badges.forEach((b, i) => {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'badge-toast';
      el.innerHTML = `<span class="icon">${b.icon}</span><span><span class="title">Badge unlocked: ${b.name}</span><br><span class="sub">${b.desc}</span></span>`;
      container.appendChild(el);
      setTimeout(() => el.remove(), 3800);
    }, i * 600);
  });
}

function renderStreak(){
  const el = document.getElementById('streakRow');
  const cur = progress.streak.current || 0;
  const longest = progress.streak.longest || 0;
  el.innerHTML = `<span class="flame">🔥</span> ${cur}-day streak <span class="longest">best: ${longest}</span>`;
}

function renderBadgeShelf(){
  const shelf = document.getElementById('badgeShelf');
  const label = document.getElementById('badgeSectionLabel');
  label.textContent = `Badges — ${progress.badges.length}/${BADGES.length}`;
  shelf.innerHTML = '';
  BADGES.forEach(b => {
    const unlocked = progress.badges.includes(b.id);
    const chip = document.createElement('div');
    chip.className = 'badge-chip ' + (unlocked ? 'unlocked' : 'locked');
    chip.textContent = b.icon;
    chip.title = unlocked ? `${b.name} — ${b.desc}` : `Locked — ${b.desc}`;
    shelf.appendChild(chip);
  });
}

// --- Home screen rendering ---
function renderHome(){
  renderStreak();
  renderTierTabs();
  renderProgressBar();
  renderLevelGrid();
  renderBadgeShelf();
}

function renderTierTabs(){
  const tabsEl = document.getElementById('tierTabs');
  tabsEl.innerHTML = '';
  TIERS.forEach(tier => {
    const start = tierStart(tier);
    const unlocked = progress.unlockedLevel >= start;
    const completedInTier = Math.max(0, Math.min(50, progress.unlockedLevel - start));
    const div = document.createElement('div');
    div.className = 'tier-tab' + (tier === activeTab ? ' active' : '') + (!unlocked ? ' locked' : '');
    div.innerHTML = tierLabel(tier) + `<span class="tag">${unlocked ? completedInTier + '/50' : 'Locked'}</span>`;
    if(unlocked){
      div.addEventListener('click', () => { activeTab = tier; renderHome(); });
    }
    tabsEl.appendChild(div);
  });
}

function renderProgressBar(){
  const start = tierStart(activeTab);
  const completed = Math.max(0, Math.min(50, progress.unlockedLevel - start));
  document.getElementById('progressFill').style.width = (completed / 50 * 100) + '%';
  document.getElementById('progressLabel').textContent = `${tierLabel(activeTab)}: ${completed}/50 complete`;
}

function renderLevelGrid(){
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';
  const start = tierStart(activeTab);
  for(let i = 1; i <= 50; i++){
    const globalLevel = start + i - 1;
    const isLocked = globalLevel > progress.unlockedLevel;
    const isCompleted = globalLevel < progress.unlockedLevel;
    const isCurrent = globalLevel === progress.unlockedLevel;
    const card = document.createElement('div');
    card.className = 'level-card' + (isLocked ? ' locked' : '') + (isCompleted ? ' completed' : '') + (isCurrent ? ' current' : '');
    card.textContent = i;
    if(!isLocked){
      card.addEventListener('click', () => selectLevel(globalLevel));
    }
    grid.appendChild(card);
  }
}

function selectLevel(globalLevel){
  currentLevel = globalLevel;
  levelCompleteHandled = false;
  usedUndoThisGame = false;
  const cfg = LEVELS[globalLevel - 1];
  AI_SKILL_LEVEL = cfg.skill;
  AI_MOVE_TIME_MS = cfg.moveTimeMs;
  currentBlunderRate = cfg.blunderRate;

  game.reset();
  selectedSquare = null;
  legalTargets = [];
  lastMove = null;
  aiThinking = false;
  stopThinkTimer();

  document.getElementById('levelBadge').textContent = `${tierLabel(cfg.tier)} ${cfg.within}`;
  document.getElementById('panelSub').textContent = `You play White. ${tierLabel(cfg.tier)} level ${cfg.within} of 50.`;
  document.getElementById('winBanner').classList.remove('show');
  document.getElementById('homeScreen').style.display = 'none';
  document.getElementById('playScreen').style.display = 'block';

  registerPlaySession();

  if(engine && engineReady){
    engine.postMessage(`setoption name Skill Level value ${AI_SKILL_LEVEL}`);
  }
  render();
}

function backToHome(){
  document.getElementById('playScreen').style.display = 'none';
  document.getElementById('homeScreen').style.display = 'flex';
  renderHome();
}

function maybeHandleGameEnd(){
  if(!game.in_checkmate() || levelCompleteHandled) return;
  const humanWon = game.turn() !== HUMAN_COLOR; // side to move is the side that got mated
  if(!humanWon) return;
  levelCompleteHandled = true;

  const cfg = LEVELS[currentLevel - 1];
  const wasFrontier = currentLevel === progress.unlockedLevel && progress.unlockedLevel < 150;
  if(wasFrontier){
    progress.unlockedLevel += 1;
  }
  if(currentLevel === 150){
    progress.completedLadder = true;
  }
  if(!usedUndoThisGame){
    progress.hasFlawlessWin = true;
  }
  saveProgress();
  checkBadges();

  const title = document.getElementById('winTitle');
  const sub = document.getElementById('winSub');
  title.textContent = `Level complete — ${tierLabel(cfg.tier)} ${cfg.within} beaten!`;

  if(!wasFrontier){
    sub.textContent = 'Nice replay — this level was already cleared.';
  } else if(currentLevel === 150){
    sub.textContent = "You've beaten the entire ladder. Legendary.";
  } else {
    const nextCfg = LEVELS[currentLevel]; // 0-indexed array, so this is the next level
    const crossedTier = nextCfg.tier !== cfg.tier;
    sub.textContent = crossedTier
      ? `${tierLabel(nextCfg.tier)} tier unlocked! Level ${nextCfg.within} awaits.`
      : `${tierLabel(nextCfg.tier)} ${nextCfg.within} unlocked.`;
  }
  document.getElementById('winBanner').classList.add('show');
}

function applyRandomLegalMove(){
  const moves = game.moves({ verbose: true });
  if(moves.length === 0) return;
  const m = moves[Math.floor(Math.random() * moves.length)];
  const result = game.move({ from: m.from, to: m.to, promotion: m.promotion || 'q' });
  reactToMove(result);
}

const game = new Chess();
let selectedSquare = null;
let legalTargets = [];
let flipped = false;
let lastMove = null; // { from, to } — drives the last-move square highlight

// --- Sound effects (generated tones via Web Audio API — no asset files needed) ---
const soundManager = (() => {
  let ctx = null;
  let muted = false;

  function getCtx(){
    if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    return ctx;
  }

  function tone(freq, duration, type, gainLevel, delay){
    if(muted) return;
    try{
      const c = getCtx();
      const osc = c.createOscillator();
      const gain = c.createGain();
      osc.type = type || 'sine';
      osc.frequency.value = freq;
      const t0 = c.currentTime + (delay || 0);
      gain.gain.setValueAtTime(gainLevel, t0);
      gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
      osc.connect(gain);
      gain.connect(c.destination);
      osc.start(t0);
      osc.stop(t0 + duration);
    } catch(e){ /* audio not available — fail silently */ }
  }

  return {
    move(){ tone(520, 0.09, 'sine', 0.15, 0); },
    capture(){ tone(340, 0.12, 'square', 0.13, 0); },
    check(){ tone(720, 0.09, 'sine', 0.15, 0); tone(880, 0.12, 'sine', 0.15, 0.1); },
    checkmate(){ tone(500, 0.15, 'sine', 0.16, 0); tone(400, 0.15, 'sine', 0.16, 0.14); tone(300, 0.28, 'sine', 0.18, 0.28); },
    toggleMute(){ muted = !muted; return muted; }
  };
})();

function reactToMove(moveResult){
  if(!moveResult) return;
  lastMove = { from: moveResult.from, to: moveResult.to };
  if(game.in_checkmate()) soundManager.checkmate();
  else if(game.in_check()) soundManager.check();
  else if(moveResult.flags && (moveResult.flags.includes('c') || moveResult.flags.includes('e'))) soundManager.capture();
  else soundManager.move();
}

// --- Captured pieces / material advantage ---
const START_COUNTS = { p: 8, n: 2, b: 2, r: 2, q: 1 };
const PIECE_VALUE = { p: 1, n: 3, b: 3, r: 5, q: 9 };

function updateCapturedPieces(){
  const board = game.board();
  const present = { w: { p:0,n:0,b:0,r:0,q:0 }, b: { p:0,n:0,b:0,r:0,q:0 } };
  board.forEach(row => row.forEach(sq => {
    if(sq && sq.type !== 'k') present[sq.color][sq.type]++;
  }));

  let whiteAdvantage = 0;
  const capturedByWhiteEl = document.getElementById('capturedByWhite');
  const capturedByBlackEl = document.getElementById('capturedByBlack');
  capturedByWhiteEl.innerHTML = '';
  capturedByBlackEl.innerHTML = '';

  ['q','r','b','n','p'].forEach(type => {
    const missingBlack = START_COUNTS[type] - present.b[type]; // captured BY white
    const missingWhite = START_COUNTS[type] - present.w[type]; // captured BY black
    whiteAdvantage += missingBlack * PIECE_VALUE[type];
    whiteAdvantage -= missingWhite * PIECE_VALUE[type];

    for(let i = 0; i < missingBlack; i++){
      const s = document.createElement('span');
      s.className = 'piece-icon';
      s.textContent = PIECE_UNICODE[type] + '\uFE0E';
      capturedByWhiteEl.appendChild(s);
    }
    for(let i = 0; i < missingWhite; i++){
      const s = document.createElement('span');
      s.className = 'piece-icon';
      s.textContent = PIECE_UNICODE[type.toUpperCase()] + '\uFE0E';
      capturedByBlackEl.appendChild(s);
    }
  });

  if(whiteAdvantage !== 0){
    const target = whiteAdvantage > 0 ? capturedByWhiteEl : capturedByBlackEl;
    const adv = document.createElement('span');
    adv.className = 'adv';
    adv.textContent = '+' + Math.abs(whiteAdvantage);
    target.appendChild(adv);
  }
}

// --- AI opponent (Stockfish via Web Worker) ---
const HUMAN_COLOR = 'w';
let AI_SKILL_LEVEL = 5;         // overwritten per-level by selectLevel()
let AI_MOVE_TIME_MS = 600;      // overwritten per-level by selectLevel()
let currentBlunderRate = 0;     // overwritten per-level by selectLevel()
let ignoreNextBestmove = false; // set when Undo interrupts a pending AI think
let watchdogHandle = null;      // safety net in case the engine ever stalls
let engine = null;
let engineReady = false;
let engineFailed = false;
let aiThinking = false;
let thinkStartTime = null;
let thinkTimerHandle = null;

async function initEngine(){
  try{
    statusText.textContent = 'Loading engine…';
    const resp = await fetch(STOCKFISH_URL);
    if(!resp.ok) throw new Error('Fetch failed: ' + resp.status);
    const code = await resp.text();
    // Workers can't load a script directly from another domain, so we pull the
    // code in ourselves and hand the worker a same-origin blob copy of it.
    const blobUrl = URL.createObjectURL(new Blob([code], { type: 'application/javascript' }));
    engine = new Worker(blobUrl);
    engine.onmessage = handleEngineMessage;
    engine.onerror = (err) => {
      engineFailed = true;
      statusText.textContent = 'Engine error — see console';
      console.error('Stockfish worker error:', err.message || err);
    };
    engine.postMessage('uci');
  } catch(err){
    engineFailed = true;
    statusText.textContent = 'Engine failed to load — check connection';
    console.error('Engine init failed:', err);
  }
}

function handleEngineMessage(e){
  const line = typeof e.data === 'string' ? e.data : '';

  if(line === 'uciok'){
    engine.postMessage(`setoption name Skill Level value ${AI_SKILL_LEVEL}`);
    engine.postMessage('isready');
    return;
  }

  if(line === 'readyok'){
    engineReady = true;
    render();
    return;
  }

  if(line.startsWith('bestmove')){
    clearTimeout(watchdogHandle);
    aiThinking = false;
    stopThinkTimer();

    if(ignoreNextBestmove){
      ignoreNextBestmove = false;
      render();
      return;
    }

    const parts = line.split(' ');
    const uciMove = parts[1]; // e.g. "e7e8q" or "e2e4"
    if(uciMove && uciMove !== '(none)'){
      if(Math.random() < currentBlunderRate){
        applyRandomLegalMove(); // low levels occasionally ignore the engine and play a real mistake
      } else {
        applyEngineMove(uciMove);
      }
    }
    render();
    maybeHandleGameEnd();
  }
}

function applyEngineMove(uciMove){
  const from = uciMove.slice(0, 2);
  const to = uciMove.slice(2, 4);
  const promotion = uciMove.length > 4 ? uciMove[4] : undefined;
  const result = game.move({ from, to, promotion: promotion || 'q' });
  reactToMove(result);
}

function maybeTriggerAI(){
  if(game.game_over()) return;
  if(game.turn() === HUMAN_COLOR) return;
  if(engineFailed) return;
  if(!engineReady){
    // engine still warming up — retry shortly rather than dropping the turn
    setTimeout(maybeTriggerAI, 150);
    return;
  }
  aiThinking = true;
  startThinkTimer();
  render();
  engine.postMessage(`position fen ${game.fen()}`);
  engine.postMessage(`go movetime ${AI_MOVE_TIME_MS}`);
  clearTimeout(watchdogHandle);
  watchdogHandle = setTimeout(() => {
    // Safety net: if the engine hasn't answered well past its time budget,
    // force it to answer now rather than leaving the game stuck forever.
    if(aiThinking && engine) engine.postMessage('stop');
  }, AI_MOVE_TIME_MS + 4000);
}

function startThinkTimer(){
  thinkStartTime = performance.now();
  clearInterval(thinkTimerHandle);
  thinkTimerHandle = setInterval(() => {
    if(!aiThinking) return;
    const elapsed = ((performance.now() - thinkStartTime) / 1000).toFixed(1);
    statusText.textContent = `AI is thinking… ${elapsed}s`;
  }, 100);
}

function stopThinkTimer(){
  clearInterval(thinkTimerHandle);
  thinkTimerHandle = null;
}

const PIECE_UNICODE = {
  p:'♟', r:'♜', n:'♞', b:'♝', q:'♛', k:'♚',
  P:'♙', R:'♖', N:'♘', B:'♗', Q:'♕', K:'♔'
};

const boardEl = document.getElementById('board');
const statusText = document.getElementById('statusText');
const movelistEl = document.getElementById('movelist');
const emptyNote = document.getElementById('emptyNote');

function squareId(fileIdx, rankIdx){
  // fileIdx 0-7 => a-h, rankIdx 0-7 => 8-1 (top to bottom as drawn)
  const files = 'abcdefgh';
  return files[fileIdx] + (8 - rankIdx);
}

function render(){
  boardEl.innerHTML = '';
  const board = game.board(); // 8x8, board[0] = rank 8 ... board[7] = rank 1

  for(let r = 0; r < 8; r++){
    for(let f = 0; f < 8; f++){
      const rowIdx = flipped ? 7 - r : r;
      const colIdx = flipped ? 7 - f : f;
      const piece = board[rowIdx][colIdx];
      const sq = squareId(colIdx, rowIdx);

      const isLight = (rowIdx + colIdx) % 2 === 0;
      const div = document.createElement('div');
      div.className = 'sq ' + (isLight ? 'light' : 'dark');
      div.dataset.square = sq;

      if(colIdx === (flipped ? 7 : 0)){
        const rankLabel = document.createElement('span');
        rankLabel.className = 'coord rank';
        rankLabel.textContent = 8 - rowIdx;
        div.appendChild(rankLabel);
      }
      if(rowIdx === (flipped ? 0 : 7)){
        const fileLabel = document.createElement('span');
        fileLabel.className = 'coord file';
        fileLabel.textContent = 'abcdefgh'[colIdx];
        div.appendChild(fileLabel);
      }

      if(piece){
        const span = document.createElement('span');
        span.className = piece.color === 'w' ? 'piece-w' : 'piece-b';
        const glyph = PIECE_UNICODE[piece.color === 'w' ? piece.type.toUpperCase() : piece.type];
        // \uFE0E forces plain text-style rendering instead of iOS's colorful emoji-style glyph
        span.textContent = glyph + '\uFE0E';
        div.appendChild(span);
      }

      if(sq === selectedSquare){
        div.classList.add('selected');
      }

      if(lastMove && (sq === lastMove.from || sq === lastMove.to)){
        div.classList.add('last-move');
      }

      if(piece && piece.type === 'k' && piece.color === game.turn() && game.in_check()){
        div.classList.add('king-check');
      }

      if(legalTargets.includes(sq)){
        const dot = document.createElement('div');
        const targetPiece = game.get(sq);
        dot.className = 'dot' + (targetPiece ? ' capture' : '');
        div.appendChild(dot);
      }

      div.addEventListener('click', () => onSquareClick(sq));
      boardEl.appendChild(div);
    }
  }

  updateStatus();
  updateCapturedPieces();
  updateMoveList();
}

function onSquareClick(sq){
  if(aiThinking || game.turn() !== HUMAN_COLOR) return;
  const piece = game.get(sq);

  if(selectedSquare){
    if(legalTargets.includes(sq)){
      const moveObj = { from: selectedSquare, to: sq, promotion: 'q' };
      const result = game.move(moveObj);
      reactToMove(result);
      selectedSquare = null;
      legalTargets = [];
      render();
      maybeHandleGameEnd();
      maybeTriggerAI();
      return;
    }
    // clicking another own piece re-selects
    if(piece && piece.color === game.turn()){
      selectedSquare = sq;
      legalTargets = game.moves({ square: sq, verbose: true }).map(m => m.to);
      render();
      return;
    }
    selectedSquare = null;
    legalTargets = [];
    render();
    return;
  }

  if(piece && piece.color === game.turn()){
    selectedSquare = sq;
    legalTargets = game.moves({ square: sq, verbose: true }).map(m => m.to);
    render();
  }
}

function updateStatus(){
  const dot = document.querySelector('.status-dot');
  dot.classList.toggle('thinking', aiThinking);

  if(game.in_checkmate()){
    const winner = game.turn() === 'w' ? 'Black' : 'White';
    statusText.textContent = `Checkmate — ${winner} wins`;
  } else if(game.in_draw()){
    statusText.textContent = 'Draw';
  } else if(aiThinking){
    statusText.textContent = 'AI is thinking…';
  } else if(game.in_check()){
    statusText.textContent = (game.turn() === 'w' ? 'White' : 'Black') + ' to move — in check';
  } else {
    statusText.textContent = (game.turn() === 'w' ? 'White' : 'Black') + ' to move';
  }
}

function updateMoveList(){
  const history = game.history();
  movelistEl.innerHTML = '';
  if(history.length === 0){
    emptyNote.style.display = 'block';
    return;
  }
  emptyNote.style.display = 'none';

  for(let i = 0; i < history.length; i += 2){
    const num = document.createElement('span');
    num.className = 'num';
    num.textContent = (i/2 + 1) + '.';
    const white = document.createElement('span');
    white.className = 'mv';
    white.textContent = history[i] || '';
    const black = document.createElement('span');
    black.className = 'mv';
    black.textContent = history[i+1] || '';
    movelistEl.appendChild(num);
    movelistEl.appendChild(white);
    movelistEl.appendChild(black);
  }
  movelistEl.scrollTop = movelistEl.scrollHeight;
}

document.getElementById('newGameBtn').addEventListener('click', () => {
  game.reset();
  selectedSquare = null;
  legalTargets = [];
  lastMove = null;
  aiThinking = false;
  levelCompleteHandled = false;
  usedUndoThisGame = false;
  stopThinkTimer();
  document.getElementById('winBanner').classList.remove('show');
  if(engine && engineReady) engine.postMessage('ucinewgame');
  render();
});

document.getElementById('backBtn').addEventListener('click', backToHome);

document.getElementById('nextLevelBtn').addEventListener('click', () => {
  if(currentLevel < 150){
    selectLevel(currentLevel + 1);
  } else {
    backToHome();
  }
});

document.getElementById('undoBtn').addEventListener('click', () => {
  usedUndoThisGame = true;
  if(aiThinking){
    // Interrupt the engine's current search rather than blocking Undo entirely.
    ignoreNextBestmove = true;
    if(engine) engine.postMessage('stop');
    aiThinking = false;
    stopThinkTimer();
  }

  if(game.turn() === HUMAN_COLOR){
    game.undo(); // undo the AI's reply
    game.undo(); // undo your move
  } else {
    // AI hasn't replied yet (or we just interrupted it) — only your move needs undoing
    game.undo();
  }

  // Recompute the last-move highlight from whatever's left in history now
  const hist = game.history({ verbose: true });
  lastMove = hist.length ? { from: hist[hist.length - 1].from, to: hist[hist.length - 1].to } : null;

  selectedSquare = null;
  legalTargets = [];
  levelCompleteHandled = false;
  document.getElementById('winBanner').classList.remove('show');
  render();
});

document.getElementById('flipBtn').addEventListener('click', () => {
  flipped = !flipped;
  render();
});

document.getElementById('muteBtn').addEventListener('click', (e) => {
  const isMuted = soundManager.toggleMute();
  e.target.textContent = isMuted ? '🔇' : '🔊';
});

renderHome();
checkBadges(); // retroactively awards any badge milestones already met from prior progress
initEngine(); // async — loads the engine in the background

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(err => {
      console.warn('Service worker registration failed (app still works fine, just without offline caching):', err);
    });
  });
}
</script>
